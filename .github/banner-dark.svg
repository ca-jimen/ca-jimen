<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" role="img" aria-label="Carlos Jimenez — Software engineer building public-safety tools in San Diego.">
  <defs>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0E0F12"/>
      <stop offset="100%" stop-color="#15171B"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="300" fill="url(#ink)"/>

  <!-- editorial frame: thin top + bottom rules -->
  <line x1="60" y1="34" x2="1140" y2="34" stroke="#EDE8DE" stroke-width="0.75" opacity="0.35"/>
  <line x1="60" y1="266" x2="1140" y2="266" stroke="#EDE8DE" stroke-width="0.75" opacity="0.35"/>

  <!-- top meta row -->
  <text x="60" y="22" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="11" fill="#8A847A" letter-spacing="3">VOL. I  ·  SAN DIEGO  ·  EST. 2022</text>
  <text x="1140" y="22" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="11" fill="#8A847A" letter-spacing="3" text-anchor="end">PORTFOLIO / 2026</text>

  <!-- accent vertical mark -->
  <line x1="76" y1="86" x2="76" y2="232" stroke="#E85D4A" stroke-width="2"/>

  <!-- name -->
  <text x="108" y="148" font-family="'Cormorant Garamond', Georgia, 'Times New Roman', serif" font-size="76" font-style="italic" font-weight="500" fill="#EDE8DE" letter-spacing="-1.5">Carlos Jimenez</text>

  <!-- thin underline / typographic flourish -->
  <line x1="108" y1="172" x2="240" y2="172" stroke="#EDE8DE" stroke-width="1.25"/>

  <!-- tagline -->
  <text x="108" y="208" font-family="Georgia, 'Times New Roman', serif" font-size="20" fill="#B8B0A4" letter-spacing="0.2">Software engineer building public-safety tools</text>
  <text x="108" y="234" font-family="Georgia, 'Times New Roman', serif" font-size="20" fill="#B8B0A4" letter-spacing="0.2">and self-hosted infrastructure in San Diego.</text>

  <!-- right meta -->
  <text x="1140" y="252" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="12" fill="#E85D4A" letter-spacing="3" text-anchor="end">▸ SDFD  ·  CA</text>
</svg>
